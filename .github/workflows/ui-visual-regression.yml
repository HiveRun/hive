name: UI Visual Regression

on:
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/ui-visual-regression.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  storybook-visual:
    name: Storybook Visual Regression
    runs-on: blacksmith-2vcpu-ubuntu-2404
    container:
      image: mcr.microsoft.com/playwright:v1.55.1-jammy
      options: --ipc=host
    continue-on-error: true
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Cache Bun download artifacts
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-cache-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Storybook visual snapshot checks
        run: bun run --cwd apps/web visual:test
